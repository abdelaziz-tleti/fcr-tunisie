ody><header class="appbar"><div class="appbar-in"><div class="brand"><span class="mark" aria-label="Drapeau tunisien"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#dc2640"/><circle cx="50" cy="50" r="30" fill="#fff"/><circle cx="47" cy="50" r="19" fill="#dc2640"/><circle cx="54" cy="50" r="15.5" fill="#fff"/><path d="M62 39 l3.4 8.4 9 0 -7.2 6 2.7 9.2 -7.9-5.8 -7.9 5.8 2.7-9.2 -7.2-6 9 0z" fill="#dc2640"/></svg></span><div><h1>FCR Tunisie</h1><p id="brandSub"></p></div></div><button class="phase-prog" id="phaseProg" type="button" title="Avancement des phases"></button><div class="lang" role="group" aria-label="Langue"><button data-l="fr" type="button">FR</button> <button data-l="en" type="button">EN</button> <button data-l="ar" type="button">العربية</button></div></div><div class="topbar mobile-only" id="topbar"><div class="seg" id="phasebar"></div><div class="chips" id="groupbar"></div></div></header><div class="shell"><aside class="sidebar desktop-only"><div class="panel"><div class="overall"><div class="ring" id="deskRing"><span id="deskRingPct">0%</span></div><div><strong id="deskProgLabel"></strong><small id="deskProgCount"></small></div></div><nav id="deskNav" aria-label="Navigation"></nav><button class="reset-btn" id="deskReset" type="button"></button></div></aside><main class="app" id="main"></main></div><noscript><article style="max-width:820px;margin:1rem auto;padding:1rem;line-height:1.6"><h1>FCR Tunisie 2026 — Importer votre voiture (changement de résidence)</h1><p>Le régime <strong>FCR (Franchise pour Changement de Résidence)</strong> permet à un Tunisien résidant à l'étranger d'importer un véhicule en Tunisie en exonération totale ou partielle des droits et taxes de douane. Voici les conditions, les documents et les étapes officielles, à jour de la loi de finances 2024 et du décret de juin 2024.</p><h2>Conditions d'éligibilité FCR</h2><ul><li><strong>Bénéficiaire :</strong> Tunisien âgé de plus de 18 ans. Privilège accordé une fois tous les 10 ans (loi de finances 2024).</li><li><strong>Âge du véhicule :</strong> 5 ans maximum (voitures de tourisme et utilitaires légers de moins de 3,5 t), à la date d'acquisition ou d'importation.</li><li><strong>Résidence à l'étranger :</strong> au moins 2 ans consécutifs hors de Tunisie.</li><li><strong>Présence en Tunisie :</strong> 183 jours par an maximum (seuil relevé par le décret de juin 2024 ; 120 jours auparavant).</li><li><strong>Importation de devises :</strong> un montant équivalent aux droits et taxes doit être importé en devises (ou débité d'un compte en devises) dans l'année précédant l'importation.</li><li><strong>Fiscalité &amp; plaque :</strong> exonération totale avec plaque incessible « ن ت » (RS), ou exonération partielle à 25 % des droits et taxes (30 % pour les grosses cylindrées) avec plaque normale cessible.</li></ul><h2>Phase 1 — Dans le pays de résidence</h2><p>Vérifier l'éligibilité FCR, l'âge du véhicule et les conditions de séjour. Réunir : preuve de paiement du véhicule (virement bancaire recommandé), facture d'achat originale, certificat de cession signé, déclaration d'achat, carte grise originale barrée et datée, certificat de non-gage. Au consulat de Tunisie : légalisation de signature et fiche des mouvements frontaliers.</p><h2>Phase 2 — La traversée en bateau</h2><p>À bord du navire : remplir la déclaration de douane du véhicule et récupérer le permis de circulation provisoire.</p><h2>Phase 3 — En Tunisie : inspection et douane</h2><p>Documents administratifs : photocopie des 32 pages du passeport, photocopie de la CIN (bénéficiaire et conjoint), extrait de naissance tunisien de moins de 3 mois, certificat de non-gage récent. Inspection ATTT : passage de la Mou3ayna (معاينة) et obtention du Certificat d'identification (Annexe V), fiche de pesée pour les utilitaires. Douane et transitaire : saisie de la déclaration, demande de privilège fiscal (Modèle 6.3.41), dépôt du dossier complet, paiement des droits et obtention de la mainlevée.</p><h2>Phase 4 — Formalités finales et immatriculation</h2><p>Demande de carte grise tunisienne auprès de l'ATTT, pose de la nouvelle plaque, souscription d'une assurance tunisienne, achat de la vignette (taxe de circulation), et autorisation de conduite RS (le conjoint conduit avec justificatif ; les autres en présence du bénéficiaire ou du conjoint).</p><h2>Questions fréquentes</h2><p><strong>Qu'est-ce que la Mou3ayna ?</strong> Visite technique d'identification du véhicule dans un centre de l'ATTT, débouchant sur le Certificat d'identification (Annexe V).</p><p><strong>Combien de fois peut-on bénéficier du FCR ?</strong> Une fois tous les 10 ans depuis la loi de finances 2024.</p><p><strong>Qui peut conduire un véhicule RS ?</strong> Le bénéficiaire et son conjoint (avec justificatif) ; toute autre personne uniquement en leur présence, sinon avec autorisation de la douane.</p><p><em>Outil d'aide non officiel. Vérifiez toujours auprès de la Douane tunisienne, de l'ATTT et du Consulat de Tunisie. Mise à jour : 13 juin 2026.</em></p></article></noscript><nav class="tabbar mobile-only" id="tabbar" aria-label="Sections"></nav><script>const UPDATED="13 juin 2026",P={home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.7V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.7"/>',globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>',ship:'<path d="M4 17 5.5 11h13L20 17"/><path d="M12 6v5M9.5 6h5"/><path d="M3.5 19c1.4 1 2.6 1 4 0s2.6-1 4 0 2.6 1 4 0 2.6-1 4 0"/>',landmark:'<path d="M12 3 4 8h16zM3 21h18M6 21V11M10 21V11M14 21V11M18 21V11"/>',card:'<rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 10h18"/>',check:'<circle cx="12" cy="12" r="9"/><path d="M8.4 12.4l2.6 2.6 4.6-5.2"/>',check2:'<path d="M20 6.5 9.4 17.5 4 12"/>',help:'<circle cx="12" cy="12" r="9"/><path d="M9.6 9.4a2.5 2.5 0 1 1 3.6 2.4c-.9.5-1.2 1-1.2 1.9"/><path d="M12 16.6h.01"/>',car:'<path d="M3 13.5 4.9 8a2 2 0 0 1 1.9- riculation.",ar:"بالرقم المنجمي الجديد.",en:"With the new registration number."}},{t:{fr:"Achat de la vignette",ar:"شراء الأداء على وسائل النقل",en:"Buy the road tax sticker"},d:{fr:"Taxe de circulation à la Recette des Finances.",ar:"معلوم الجولان بقباضة المالية.",en:"Circulation tax at the Revenue Office."}},{t:{fr:"Conduite du véhicule RS",ar:"سياقة سيارة RS",en:"Driving the RS vehicle"},d:{fr:"Conjoint : conduite autorisée avec justificatif. Autres : en présence du bénéficiaire/conjoint, sinon autorisation de la douane.",ar:"القرين: السياقة مرخّصة مع ما يُثبت ذلك. الآخرون: بحضور المنتفع/القرين، وإلا فبترخيص من الديوانة.",en:"Spouse: allowed with proof. Others: in presence of the beneficiary/spouse, otherwise customs authorization."}}]}]},{key:"cond",icon:"check",short:{fr:"Conditions",ar:"الشروط",en:"Conditions"},phase:{fr:"Éligibilité",ar:"الأهلية",en:"Eligibility"},title:{fr:"Conditions d'éligibilité",ar:"شروط الانتفاع",en:"Eligibility conditions"},sub:{fr:"Qui peut bénéficier du régime FCR, et sous quelles conditions.",ar:"من يمكنه الانتفاع بنظام FCR، وبأيّ شروط.",en:"Who can benefit from the FCR scheme, and under what conditions."},custom:"cond"},{key:"faq",icon:"help",short:{fr:"FAQ",ar:"أسئلة",en:"FAQ"},phase:{fr:"Aide",ar:"مساعدة",en:"Help"},title:{fr:"Questions fréquentes",ar:"أسئلة شائعة",en:"Frequently asked questions"},sub:{fr:"Les points qui bloquent le plus souvent.",ar:"النقاط التي تثير الإشكال غالبًا.",en:"The points that most often cause trouble."},custom:"faq"}],CONDS=[{ic:"user",t:{fr:"Bénéficiaire",ar:"المنتفع",en:"Beneficiary"},d:{fr:"Tunisien âgé de plus de 18 ans. Privilège accordé une fois tous les 10 ans (loi de finances 2024).",ar:"تونسي يفوق سنّه 18 عامًا. يُمنح الامتياز مرة كل 10 سنوات (قانون المالية 2024).",en:"Tunisian over 18. Privilege granted once every 10 years (2024 finance law)."}},{ic:"car",t:{fr:"Âge du véhicule",ar:"عمر السيارة",en:"Vehicle age"},d:{fr:"≤ 5 ans (tourisme et utilitaires légers < 3,5 t), à la date d'acquisition ou d'importation.",ar:"≤ 5 سنوات (سياحية ونفعية خفيفة < 3,5 طن)، في تاريخ الاقتناء أو التوريد.",en:"≤ 5 years (cars and light commercial < 3.5 t), at acquisition or import date."}},{ic:"home",t:{fr:"Durée de résidence à l'étranger",ar:"مدة الإقامة بالخارج",en:"Time residing abroad"},d:{fr:"Au moins 2 ans consécutifs hors de Tunisie.",ar:"سنتان متتاليتان على الأقل خارج تونس.",en:"At least 2 consecutive years outside Tunisia."}},{ic:"calendar",t:{fr:"Présence en Tunisie",ar:"التواجد في تونس",en:"Presence in Tunisia"},d:{fr:"≤ 183 jours par an (seuil relevé par le décret de juin 2024 ; 120 j auparavant).",ar:"≤ 183 يومًا في السنة (رُفع السقف بمرسوم جوان 2024؛ كان 120 يومًا سابقًا).",en:"≤ 183 days per year (raised by the June 2024 decree; 120 days before)."}},{ic:"money",t:{fr:"Importation de devises",ar:"توريد العملة الصعبة",en:"Currency import"},d:{fr:"Importer en devises un montant équivalent aux droits et taxes (ou le débiter d'un compte en devises), dans l'année précédant l'importation.",ar:"توريد مبلغ بالعملة الصعبة يعادل المعاليم والأداءات (أو خصمه من حساب بالعملة)، خلال السنة السابقة للتوريد.",en:"Import in foreign currency an amount equal to the duties and taxes (or debit a forex account), in the year before import."}},{ic:"coins",t:{fr:"Régime fiscal & plaque",ar:"النظام الجبائي واللوحة",en:"Tax regime & plate"},d:{fr:"Exonération totale → plaque incessible « ن ت » (RS). Exonération partielle → 25 % des droits/taxes (30 % grosses cylindrées) + plaque normale cessible.",ar:"إعفاء كلي → لوحة «ن ت» (RS) غير قابلة للتفويت. إعفاء جزئي → 25٪ من المعاليم (30٪ للمحركات الكبيرة) + لوحة عادية قابلة للتفويت.",en:"Full exemption → non-transferable « ن ت » (RS) plate. Partial exemption → 25% of duties/taxes (30% for large engines) + normal transferable plate."}}],INTRO_CARDS=[{ic:"compass",t:{fr:"Comment l'utiliser",ar:"كيفية الاستعمال",en:"How to use it"},d:{fr:"Parcourez les 4 phases dans l'ordre et cochez chaque étape au fur et à mesure.",ar:"تصفّح المراحل الأربع بالترتيب وأشّر على كل خطوة تباعًا.",en:"Go through the 4 phases in order and tick each step as you go."}},{ic:"save",t:{fr:"Sauvegarde auto",ar:"حفظ تلقائي",en:"Auto-save"},d:{fr:"Votre progression est enregistrée sur cet appareil — rien à créer, aucun compte.",ar:"يُحفظ تقدّمك على هذا الجهاز — دون إنشاء أي حساب.",en:"Your progress is saved on this device — nothing to create, no account."}},{ic:"lock",t:{fr:"100 % privé",ar:"خصوصية تامة",en:"100% private"},d:{fr:"Aucune donnée n'est envoyée sur internet. Tout reste dans votre navigateur.",ar:"لا تُرسل أي بيانات عبر الإنترنت. كل شيء يبقى في متصفّحك.",en:"No data is sent online. Everything stays in your browser."}}],STEPS=[{n:1,t:{fr:"À l'étranger",ar:"بالخارج",en:"Abroad"},s:{fr:"Achat & papiers",ar:"الشراء والوثائق",en:"Purchase & papers"}},{n:2,t:{fr:"Le bateau",ar:"الباخرة",en:"The ferry"},s:{fr:"La traversée",ar:"العبور",en:"The crossing"}},{n:3,t:{fr:"Douane",ar:"الديوانة",en:"Customs"},s:{fr:"Inspection ATTT",ar:"المعاينة",en:"ATTT inspection"}},{n:4,t:{fr:"Immatriculation",ar:"الترقيم",en:"Registration"},s:{fr:"Mise en circulation",ar:"الجولان",en:"On the road"}}],LEAD={fr:"Votre checklist gratuite pour importer une voiture en Tunisie sous le <b>régime FCR</b> (changement de résidence) — étape par étape.",ar:"قائمتك المجانية لاستيراد سيارة إلى تونس عبر <b>نظام FCR</b> (تغيير مكان الإقامة) — خطوة بخطوة.",en:"Your free checklist to import a car into Tunisia under the <b>FCR scheme</b> (change of residence) — step by step."},DISCLAIMER={fr:"⚠️ <b>Ce site n'est pas officiel.</b> Il a pour seul but d'<b>aider les gens</b> à préparer leur dossier FCR, gratuitement. Les exigences peuvent évoluer : vérifiez toujours auprès de la <b>Douane tunisienne</b>, de l'<b>ATTT</b> et du <b>Consulat de Tunisie</b> dont vous dépendez. Aucune donnée n'est envoyée — votre progression reste sur votre appareil.",ar:"⚠️ <b>هذا الموقع غير رسمي.</b> هدفه الوحيد هو <b>مساعدة الناس</b> على تحضير ملف FCR مجانًا. قد تتغيّر المتطلبات: تحقّق دائمًا لدى <b>الديوانة التونسية</b> و<b>ATTT</b> و<b>القنصلية التونسية</b> المعنية. لا تُرسل أي بيانات — يبقى تقدّمك على جهازك.",en:"⚠️ <b>This site is not official.</b> Its only purpose is to <b>help people</b> prepare their FCR file, for free. Requirements may change: always check with the <b>Tunisian Customs</b>, the <b>ATTT</b> and the <b>Tunisian Consulate</b> you depend on. No data is sent — your progress stays on your device."},FAQS=[{q:{fr:"Qu'est-ce que la « Mou3ayna » ?",ar:"ما هي «المعاينة»؟",en:"What is the « Mou3ayna »?"},a:{fr:"Visite technique d'identification du véhicule dans un centre de l'ATTT. Elle débouche sur le Certificat d'identification (Annexe V), indispensable pour la douane.",ar:"فحص فني لتعريف السيارة في مركز ATTT. ينتج عنه شهادة التعريف (الملحق V) الضرورية للديوانة.",en:"A technical identification inspection of the vehicle at an ATTT centre. It produces the Identification Certificate (Annex V), required by customs."}},{q:{fr:"Ai-je besoin d'un transitaire ?",ar:"هل أحتاج إلى وسيط ديواني؟",en:"Do I need a customs broker?"},a:{fr:"Oui dans la plupart des cas : il saisit la déclaration de douane et accompagne le dépôt et la validation du dossier.",ar:"نعم في أغلب الحالات: يسجّل التصريح الديواني ويرافق إيداع الملف والمصادقة عليه.",en:"Yes in most cases: they file the customs declaration and assist with submitting and validating the file."}},{q:{fr:"Pourquoi réimprimer le non-gage en Tunisie ?",ar:"لماذا تُعاد طباعة شهادة عدم الرهن في تونس؟",en:"Why reprint the non-pledge certificate in Tunisia?"},a:{fr:"La douane exige souvent un certificat récent, daté après votre entrée en Tunisie.",ar:"تطلب الديوانة غالبًا شهادة حديثة مؤرّخة بعد دخولك إلى تونس.",en:"Customs often require a recent certificate, dated after your entry into Tunisia."}},{q:{fr:"Qui peut conduire un véhicule RS ?",ar:"من يمكنه قيادة سيارة بلوحة RS؟",en:"Who can drive an RS vehicle?"},a:{fr:"Le bénéficiaire et son conjoint (sur présentation d'un justificatif de mariage) conduisent sans autorisation. Toute autre personne peut conduire uniquement en présence du bénéficiaire ou du conjoint à bord ; sinon une autorisation de la douane est nécessaire.",ar:"المنتفع وقرينه (مع تقديم ما يُثبت الزواج) يسوقان دون ترخيص. أما أي شخص آخر فلا يسوق إلا بحضور المنتفع أو القرين في السيارة؛ وإلا لزم ترخيص من الديوانة.",en:"The beneficiary and their spouse (with proof of marriage) drive without authorization. Anyone else may drive only in the presence of the beneficiary or spouse; otherwise a customs authorization is required."}},{q:{fr:"Combien de fois peut-on bénéficier du FCR ?",ar:"كم مرة يمكن الانتفاع بنظام FCR؟",en:"How many times can you benefit from FCR?"},a:{fr:"Depuis la loi de finances 2024, le privilège est accordé une fois tous les 10 ans (au lieu d'une seule fois auparavant).",ar:"منذ قانون المالية 2024، يُمنح الامتياز مرة كل 10 سنوات (بدل مرة واحدة سابقًا).",en:"Since the 2024 finance law, the privilege is granted once every 10 years (instead of only once before)."}},{q:{fr:"Le « Modèle 6.3.41 » ?",ar:"ما هو «النموذج 6.3.41»؟",en:"What is « Form 6.3.41 »?"},a:{fr:"C'est la Demande de privilège fiscal à signer pour bénéficier de la franchise dans le cadre du changement de résidence.",ar:"هو مطلب الامتياز الجبائي الذي يُمضى للانتفاع بالإعفاء في إطار تغيير مكان الإقامة.",en:"It's the Tax Privilege Request to sign in order to get the exemption under the change-of-residence scheme."}},{q:{fr:"Peut-on importer une voiture de plus de 5 ans en FCR ?",ar:"هل يمكن استيراد سيارة يفوق عمرها 5 سنوات عبر FCR؟",en:"Can you import a car older than 5 years under FCR?"},a:{fr:"Non, le FCR est réservé aux véhicules de moins de 5 ans. Au-delà, l'importation reste possible mais au régime normal, avec paiement intégral des droits et taxes.",ar:"لا، نظام FCR مخصّص للسيارات أقل من 5 سنوات. أما الأقدم فيمكن توريدها بالنظام العادي مع خلاص كامل المعاليم والأداءات.",en:"No, FCR is limited to vehicles under 5 years old. Older vehicles can still be imported, but under the normal regime with full duties and taxes."}},{q:{fr:"Peut-on vendre une voiture en plaque RS « ن ت » ?",ar:"هل يمكن بيع سيارة بلوحة «ن ت» (RS)؟",en:"Can you sell a car with an RS « ن ت » plate?"},a:{fr:"Non, elle est incessible. La revente nécessite l'autorisation de la douane et le paiement des droits et taxes restants pour la passer en plaque normale.",ar:"لا، فهي غير قابلة للتفويت. يتطلّب بيعها ترخيصًا من الديوانة وخلاص المعاليم والأداءات المتبقّية لتحويلها إلى لوحة عادية.",en:"No, it is non-transferable. Reselling requires customs authorization and payment of the remaining duties and taxes to switch it to a normal plate."}},{q:{fr:"Le FCR fonctionne-t-il depuis la France ?",ar:"هل يعمل نظام FCR انطلاقًا من فرنسا؟",en:"Does FCR work from France?"},a:{fr:"Oui. Le FCR s'applique quel que soit le pays de résidence à l'étranger (France, Allemagne, Italie, Canada…), dès lors que les conditions de résidence et de devises sont remplies.",ar:"نعم. ينطبق نظام FCR مهما كان بلد الإقامة بالخارج (فرنسا، ألمانيا، إيطاليا، كندا…) ما دامت شروط الإقامة والعملة مستوفاة.",en:"Yes. FCR applies regardless of the country of residence abroad (France, Germany, Italy, Canada…), as long as the residence and currency conditions are met."}}],CONTENT=[{h:{fr:"Qu'est-ce que le régime FCR en Tunisie ?",ar:"ما هو نظام FCR في تونس؟",en:"What is the FCR scheme in Tunisia?"},p:{fr:"Le <b>FCR (Franchise pour Changement de Résidence)</b> permet à un <b>Tunisien résidant à l'étranger</b> d'importer une voiture en Tunisie avec une <b>exonération</b> totale ou partielle des droits et taxes de douane, lors d'un retour ou d'un changement de résidence. C'est la voie la plus avantageuse pour ramener son véhicule depuis la France, l'Allemagne, l'Italie ou tout autre pays.",ar:"يُتيح <b>نظام FCR (الامتياز عند تغيير مكان الإقامة)</b> <b>للتونسي المقيم بالخارج</b> استيراد سيارة إلى تونس مع <b>إعفاء</b> كلي أو جزئي من المعاليم والأداءات الديوانية عند العودة أو تغيير الإقامة. وهو أفضل صيغة لإرجاع السيارة من فرنسا أو ألمانيا أو إيطاليا أو أي بلد آخر.",en:"The <b>FCR (change-of-residence franchise)</b> lets a <b>Tunisian living abroad</b> import a car into Tunisia with full or partial <b>exemption</b> from customs duties and taxes, when returning or changing residence. It is the most advantageous way to bring your vehicle back from France, Germany, Italy or any other country."}},{h:{fr:"Conditions FCR 2026",ar:"شروط FCR 2026",en:"FCR 2026 conditions"},p:{fr:"Être <b>tunisien de plus de 18 ans</b>, avoir résidé <b>au moins 2 ans</b> à l'étranger sans dépasser <b>183 jours par an</b> en Tunisie, et importer un véhicule de <b>moins de 5 ans</b>. Le privilège est accordé <b>une fois tous les 10 ans</b> (loi de finances 2024) et nécessite une <b>importation de devises</b> équivalente aux droits et taxes.",ar:"أن تكون <b>تونسيًا يفوق سنّك 18 عامًا</b>، وأن تكون قد أقمت <b>سنتين على الأقل</b> بالخارج دون تجاوز <b>183 يومًا سنويًا</b> في تونس، وأن تستورد سيارة <b>أقل من 5 سنوات</b>. يُمنح الامتياز <b>مرة كل 10 سنوات</b> (قانون المالية 2024) ويتطلب <b>توريد عملة صعبة</b> يعادل المعاليم والأداءات.",en:"Be <b>Tunisian over 18</b>, have lived <b>at least 2 years</b> abroad without exceeding <b>183 days per year</b> in Tunisia, and import a vehicle <b>under 5 years old</b>. The privilege is granted <b>once every 10 years</b> (2024 finance law) and requires a <b>currency import</b> equal to the duties and taxes."}},{h:{fr:"Exonération totale ou partielle : combien ça coûte ?",ar:"إعفاء كلي أو جزئي: ما الكلفة؟",en:"Full or partial exemption: how much does it cost?"},p:{fr:"Deux options : l'<b>exonération totale</b> (0 % de taxes) avec une <b>plaque incessible « ن ت » (RS)</b>, ou l'<b>exonération partielle</b> où vous payez <b>25 % des droits et taxes</b> (30 % pour les grosses cylindrées) et obtenez une <b>plaque normale</b> revendable.",ar:"خياران: <b>الإعفاء الكلي</b> (0٪) مع <b>لوحة «ن ت» غير قابلة للتفويت (RS)</b>، أو <b>الإعفاء الجزئي</b> بدفع <b>25٪ من المعاليم والأداءات</b> (30٪ للمحركات الكبيرة) مع <b>لوحة عادية</b> قابلة للبيع.",en:"Two options: <b>full exemption</b> (0% tax) with a <b>non-transferable « ن ت » (RS) plate</b>, or <b>partial exemption</b> where you pay <b>25% of duties and taxes</b> (30% for large engines) and get a <b>normal, resaleable plate</b>."}},{h:{fr:"Documents et étapes de la procédure",ar:"الوثائق ومراحل الإجراءات",en:"Documents and procedure steps"},p:{fr:"La procédure se déroule en 4 phases : achat et papiers <b>à l'étranger</b>, <b>traversée en bateau</b>, <b>inspection (Mou3ayna ATTT) et douane</b> en Tunisie, puis <b>immatriculation</b>. Utilisez la <b>checklist interactive ci-dessus</b> pour ne rien oublier et suivre votre avancement.",ar:"تمرّ الإجراءات عبر 4 مراحل: الشراء والوثائق <b>بالخارج</b>، <b>العبور بالباخرة</b>، <b>المعاينة (ATTT) والديوانة</b> في تونس، ثم <b>الترقيم</b>. استعمل <b>القائمة التفاعلية أعلاه</b> حتى لا تنسى شيئًا وتتابع تقدّمك.",en:"The procedure has 4 phases: purchase and papers <b>abroad</b>, the <b>sea crossing</b>, <b>inspection (Mou3ayna ATTT) and customs</b> in Tunisia, then <b>registration</b>. Use the <b>interactive checklist above</b> so you forget nothing and track your progress."}}],SRC={fr:"Source officielle :",ar:"المصدر الرسمي:",en:"Official source:"},KEY="fcr-tn-v3";let done=JSON.parse(localStorage.getItem(KEY)||"{}"),active="intro";const checkSvg='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>',phaseIds={},allIds=[],mainEl=document.getElementById("main"),tabbarEl=document.getElementById("tabbar"),phasebarEl=document.getElementById("phasebar"),groupbarEl=document.getElementById("groupbar"),topbarEl=document.getElementById("topbar"),deskNavEl=document.getElementById("deskNav"),SECT={};DATA.forEach(e=>SECT[e.key]=e);const PHASES=DATA.filter(e=>/^p[1-9]$/.test(e.key)),isPhase=e=>/^p[1-9]$/.test(e),TABS=[{id:"home",sec:"intro",icon:"home",label:{
