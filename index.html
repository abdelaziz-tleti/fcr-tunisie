"ar" type="button">العربية</button></div></div></header><div class="app"><aside><div class="panel"><div class="overall"><div class="ring" id="ring"><span id="ringPct">0%</span></div><div><strong id="progLabel"></strong><small id="progCount"></small></div></div><nav id="nav" aria-label="Phases"></nav><button class="reset-btn" id="resetBtn" type="button"></button></div></aside><main id="main"></main><noscript><article style="max-width:820px;margin:1rem auto;padding:1rem;line-height:1.6"><h1>FCR Tunisie 2026 — Importer votre voiture (changement de résidence)</h1><p>Le régime <strong>FCR (Franchise pour Changement de Résidence)</strong> permet à un Tunisien résidant à l'étranger d'importer un véhicule en Tunisie en exonération totale ou partielle des droits et taxes de douane. Voici les conditions, les documents et les étapes officielles, à jour de la loi de finances 2024 et du décret de juin 2024.</p><h2>Conditions d'éligibilité FCR</h2><ul><li><strong>Bénéficiaire :</strong> Tunisien âgé de plus de 18 ans. Privilège accordé une fois tous les 10 ans (loi de finances 2024).</li><li><strong>Âge du véhicule :</strong> 5 ans maximum (voitures de tourisme et utilitaires légers de moins de 3,5 t), à la date d'acquisition ou d'importation.</li><li><strong>Résidence à l'étranger :</strong> au moins 2 ans consécutifs hors de Tunisie.</li><li><strong>Présence en Tunisie :</strong> 183 jours par an maximum (seuil relevé par le décret de juin 2024 ; 120 jours auparavant).</li><li><strong>Importation de devises :</strong> un montant équivalent aux droits et taxes doit être importé en devises (ou débité d'un compte en devises) dans l'année précédant l'importation.</li><li><strong>Fiscalité &amp; plaque :</strong> exonération totale avec plaque incessible « ن ت » (RS), ou exonération partielle à 25 % des droits et taxes (30 % pour les grosses cylindrées) avec plaque normale cessible.</li></ul><h2>Phase 1 — Dans le pays de résidence</h2><p>Vérifier l'éligibilité FCR, l'âge du véhicule et les conditions de séjour. Réunir : preuve de paiement du véhicule (virement bancaire recommandé), facture d'achat originale, certificat de cession signé, déclaration d'achat, carte grise originale barrée et datée, certificat de non-gage. Au consulat de Tunisie : légalisation de signature et fiche des mouvements frontaliers.</p><h2>Phase 2 — La traversée en bateau</h2><p>À bord du navire : remplir la déclaration de douane du véhicule et récupérer le permis de circulation provisoire.</p><h2>Phase 3 — En Tunisie : inspection et douane</h2><p>Documents administratifs : photocopie des 32 pages du passeport, photocopie de la CIN (bénéficiaire et conjoint), extrait de naissance tunisien de moins de 3 mois, certificat de non-gage récent. Inspection ATTT : passage de la Mou3ayna (معاينة) et obtention du Certificat d'identification (Annexe V), fiche de pesée pour les utilitaires. Douane et transitaire : saisie de la déclaration, demande de privilège fiscal (Modèle 6.3.41), dépôt du dossier complet, paiement des droits et obtention de la mainlevée.</p><h2>Phase 4 — Formalités finales et immatriculation</h2><p>Demande de carte grise tunisienne auprès de l'ATTT, pose de la nouvelle plaque, souscription d'une assurance tunisienne, achat de la vignette (taxe de circulation), et autorisation de conduite RS (le conjoint conduit avec justificatif ; les autres en présence du bénéficiaire ou du conjoint).</p><h2>Questions fréquentes</h2><p><strong>Qu'est-ce que la Mou3ayna ?</strong> Visite technique d'identification du véhicule dans un centre de l'ATTT, débouchant sur le Certificat d'identification (Annexe V).</p><p><strong>Combien de fois peut-on bénéficier du FCR ?</strong> Une fois tous les 10 ans depuis la loi de finances 2024.</p><p><strong>Qui peut conduire un véhicule RS ?</strong> Le bénéficiaire et son conjoint (avec justificatif) ; toute autre personne uniquement en leur présence, sinon avec autorisation de la douane.</p><p><em>Outil d'aide non officiel. Vérifiez toujours auprès de la Douane tunisienne, de l'ATTT et du Consulat de Tunisie. Mise à jour : 13 juin 2026.</em></p></article></noscript></div><script>const UPDATED="13 juin 2026",P={home:'<path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.7V20a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1V9.7"/>',globe:'<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>',ship:'<path d="M4 17 5.5 11h13L20 17"/><path d="M12 6v5M9.5 6h5"/><path d="M3.5 19c1.4 1 2.6 1 4 0s2.6-1 4 0 2.6 1 4 0 2.6-1 4 0"/>',landmark:'<path d="M12 3 4 8h16zM3 21h18M6 21V11M10 21V11M14 21V11M18 21V11"/>',card:'<rect x="3" y="5" width="18" height="14" rx="2.5"/><path d="M3 10h18"/>',check:'<circle cx="12" cy="12" r="9"/><path d="M8.4 12.4l2.6 2.6 4.6-5.2"/>',help:'<circle cx="12" cy="12" r="9"/><path d="M9.6 9.4a2.5 2.5 0 1 1 3.6 2.4c-.9.5-1.2 1-1.2 1.9"/><path d="M12 16.6h.01"/>',car:'<path d="M3 13.5 4.9 8a2 2 0 0 1 1.9-1.3h10.4A2 2 0 0 1 19.1 8L21 13.5"/><path d="M3 13.5h18V18a1 1 0 0 1-1 1h-1.5M3 13.5V18a1 1 0 0 0 1 1h1.5"/><circle cx="7.2" cy="17.6" r="1.4"/><circle cx="16.8" cy="17.6" r="1.4"/>',calendar:'<rect x="3" y="5" width="18" height="16" rx="2.5"/><path d="M3 9.5h18M8 3v4M16 3v4"/>',user:'<circle cx="12" cy="8" r="3.4"/><path d="M5.5 20a6.5 6.5 0 0 1 13 0"/>',coins:'<ellipse cx="8.5" cy="7" rx="5.5" ry="2.8"/><path d="M3 7v4.5C3 13 5.5 14 8.5 14"/><ellipse cx="15.5" cy="13" rx="5.5" ry="2.8"/><path d="M10 13v4.5c0 1.5 2.5 2.5 5.5 2.5s5.5-1 5.5-2.5V13"/>',compass:'<circle cx="12" cy="12" r="9"/><path d="M15.6 8.4 13 13l-4.6 2.6L11 11z"/>',save:'<path d="M5 4h11l3 3v13H5z"/><path d="M8 4v5h7M8 20v-6h8v6"/>',lock:'<rect x="5" y="11" width="14" height="9" rx="2.5"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',info:'<circle cx="12" cy="12" r="9"/><path d="M12 11.5v4.5"/><path d="M12 8h.01"/>',money:'<rect x="2.5" y="6" width="19" height="12" rx="2"/><circle cx="12" cy="12" r="2.6"/><path d="M6 9.5v5M18 9.5v5"/>'},icon=e=>`<svg class="ic" viewBox="0 0 24 24" aria
