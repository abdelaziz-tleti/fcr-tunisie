<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FCR Tunisie — Checklist importation véhicule</title>
<meta name="description" content="Checklist moderne pour importer votre véhicule en Tunisie sous le régime FCR (changement de résidence) — Douane tunisienne & ATTT." />
<meta name="theme-color" content="#dc2640" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23dc2640'/><circle cx='50' cy='50' r='30' fill='%23ffffff'/><circle cx='47' cy='50' r='19' fill='%23dc2640'/><circle cx='54' cy='50' r='15.5' fill='%23ffffff'/><path d='M62 39 l3.4 8.4 9 0 -7.2 6 2.7 9.2 -7.9-5.8 -7.9 5.8 2.7-9.2 -7.2-6 9 0z' fill='%23dc2640'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
<style>
  @property --p { syntax: '<number>'; initial-value: 0; inherits: false; }
  :root {
    --red: #dc2640;
    --red-deep: #b01228;
    --red-soft: #fdecef;
    --ink: #1b181c;
    --muted: #726a72;
    --paper: #ffffff;
    --glass: rgba(255,255,255,.74);
    --bg: #f6f3f4;
    --line: #efe6e8;
    --green: #14a35a;
    --r-lg: 22px;
    --r-md: 16px;
    --shadow: 0 1px 2px rgba(30,20,25,.04), 0 18px 50px -24px rgba(120,20,40,.30);
    --shadow-sm: 0 1px 2px rgba(30,20,25,.05), 0 8px 24px -16px rgba(120,20,40,.35);
    --ease: cubic-bezier(.16,1,.3,1);
    --sans: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --display: "Sora", var(--sans);
    font-family: var(--sans);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased;
    background: var(--bg); min-height: 100vh; overflow-x: hidden;
  }
  /* animated mesh background */
  .mesh { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
  .blob { position: absolute; border-radius: 50%; filter: blur(60px); opacity: .55; }
  .b1 { width: 460px; height: 460px; background: #ffd2da; top: -160px; left: -120px; animation: float1 22s var(--ease) infinite alternate; }
  .b2 { width: 420px; height: 420px; background: #ffe3cf; top: -80px; right: -140px; animation: float2 26s var(--ease) infinite alternate; }
  .b3 { width: 360px; height: 360px; background: #e7ecff; bottom: -160px; left: 30%; animation: float1 30s var(--ease) infinite alternate; }
  @keyframes float1 { to { transform: translate3d(40px, 50px, 0) scale(1.12); } }
  @keyframes float2 { to { transform: translate3d(-50px, 40px, 0) scale(1.08); } }

  .app { max-width: 1040px; margin: 0 auto; padding: clamp(1rem,3vw,2.5rem) 1rem; display: grid; gap: clamp(1rem,2.5vw,1.9rem); grid-template-columns: 300px 1fr; align-items: start; }

  /* ---------- Sidebar ---------- */
  aside { position: sticky; top: clamp(1rem,3vw,2.5rem); display: flex; flex-direction: column; gap: 1rem; }
  .brand { display: flex; align-items: center; gap: .75rem; padding: 0 .25rem; }
  .brand .mark { width: 46px; height: 46px; flex: none; border-radius: 13px; overflow: hidden; box-shadow: var(--shadow-sm); display: block; transition: transform .4s var(--ease); }
  .brand .mark:hover { transform: rotate(-4deg) scale(1.06); }
  .brand .mark svg { display: block; width: 100%; height: 100%; }
  .brand h1 { margin: 0; font-family: var(--display); font-weight: 700; font-size: 1.2rem; letter-spacing: -.02em; }
  .brand p { margin: 0; font-size: .74rem; color: var(--muted); }

  .panel { background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,.7); border-radius: var(--r-lg); box-shadow: var(--shadow); padding: 1.15rem; }

  .overall { display: flex; align-items: center; gap: 1rem; }
  .ring { --p: 0; width: 62px; height: 62px; flex: none; border-radius: 50%; background: conic-gradient(var(--red) calc(var(--p)*1%), var(--line) 0); display: grid; place-items: center; transition: --p .7s var(--ease); }
  .ring::after { content:""; width: 47px; height: 47px; background: var(--paper); border-radius: 50%; grid-area: 1/1; }
  .ring span { grid-area: 1/1; z-index: 1; font-weight: 800; font-size: .85rem; font-family: var(--display); color: var(--red-deep); }
  .overall strong { display: block; font-family: var(--display); font-weight: 600; font-size: .98rem; }
  .overall small { color: var(--muted); font-size: .8rem; }

  nav { display: flex; flex-direction: column; gap: .2rem; margin-top: .7rem; }
  .nav-item { display: flex; align-items: center; gap: .7rem; width: 100%; text-align: left; border: none; background: transparent; cursor: pointer; color: var(--ink); padding: .6rem .6rem; border-radius: 13px; font: inherit; position: relative; transition: background .2s var(--ease), transform .2s var(--ease); }
  .nav-item:hover { background: var(--red-soft); transform: translateX(2px); }
  .nav-item[aria-current="true"] { background: linear-gradient(100deg, var(--red-soft), transparent); }
  .nav-item[aria-current="true"]::before { content:""; position: absolute; left: -.4rem; top: 50%; transform: translateY(-50%); width: 4px; height: 22px; border-radius: 4px; background: var(--red); }
  .nav-ic { width: 32px; height: 32px; flex: none; border-radius: 10px; display: grid; place-items: center; font-size: 1rem; background: #fff; box-shadow: var(--shadow-sm); transition: transform .25s var(--ease); }
  .nav-item:hover .nav-ic { transform: scale(1.08) rotate(-3deg); }
  .nav-tx { flex: 1; min-width: 0; }
  .nav-tx b { display: block; font-size: .89rem; font-weight: 600; }
  .nav-tx small { color: var(--muted); font-size: .73rem; }
  .nav-count { font-size: .71rem; font-weight: 700; color: var(--red-deep); background: var(--red-soft); border-radius: 999px; padding: .14rem .52rem; transition: all .25s var(--ease); }
  .nav-item.done .nav-count { background: var(--green); color: #fff; }

  .reset-btn { margin-top: .7rem; width: 100%; border: 1px solid var(--line); background: rgba(255,255,255,.6); color: var(--muted); border-radius: 12px; padding: .58rem; font: 600 .8rem var(--sans); cursor: pointer; transition: all .2s var(--ease); }
  .reset-btn:hover { color: var(--red-deep); border-color: var(--red); background: #fff; }

  /* ---------- Content ---------- */
  main { min-width: 0; }
  .view { display: none; }
  .view.active { display: block; }
  .view.active > * { animation: rise .55s var(--ease) backwards; }
  .view.active > *:nth-child(1){animation-delay:.02s} .view.active > *:nth-child(2){animation-delay:.09s}
  .view.active > *:nth-child(3){animation-delay:.16s} .view.active > *:nth-child(4){animation-delay:.23s}
  .view.active > *:nth-child(5){animation-delay:.3s} .view.active > *:nth-child(6){animation-delay:.37s}
  .view.active > *:nth-child(n+7){animation-delay:.44s}
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }

  .view-head { margin: 0 0 1.3rem; }
  .eyebrow { display: inline-flex; align-items: center; gap: .4rem; font-size: .72rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--red-deep); background: var(--red-soft); padding: .32rem .75rem; border-radius: 999px; }
  .view-head h2 { margin: .6rem 0 .25rem; font-family: var(--display); font-weight: 700; font-size: clamp(1.6rem,1rem+2vw,2.3rem); letter-spacing: -.025em; line-height: 1.08; }
  .view-head .sub { color: var(--muted); font-size: .95rem; max-width: 56ch; }

  .group { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 1rem; transition: box-shadow .3s var(--ease), transform .3s var(--ease); }
  .group:hover { box-shadow: var(--shadow); transform: translateY(-2px); }
  .group > h3 { margin: 0; padding: .85rem 1.2rem; font: 700 .73rem var(--sans); text-transform: uppercase; letter-spacing: .08em; color: var(--muted); border-bottom: 1px solid var(--line); }
  ul.tasks { list-style: none; margin: 0; padding: .4rem; }
  .task { display: flex; gap: .85rem; align-items: flex-start; padding: .72rem .85rem; border-radius: 12px; cursor: pointer; transition: background .18s var(--ease); }
  .task:hover { background: var(--red-soft); }
  .task input { position: absolute; opacity: 0; pointer-events: none; }
  .box { flex: none; width: 23px; height: 23px; border-radius: 8px; border: 2px solid #d3c7cb; margin-top: 1px; display: grid; place-items: center; transition: all .2s var(--ease); }
  .box svg { color: #fff; }
  .box svg path { stroke-dasharray: 22; stroke-dashoffset: 22; transition: stroke-dashoffset .3s var(--ease) .04s; }
  .task .label { flex: 1; }
  .task .label b { font-weight: 600; }
  .task .label small { display: block; color: var(--muted); font-size: .84rem; margin-top: .12rem; }
  .task input:checked + .box { background: var(--green); border-color: var(--green); animation: pop .32s var(--ease); }
  .task input:checked + .box svg path { stroke-dashoffset: 0; }
  .task input:checked ~ .label { color: var(--muted); }
  .task input:checked ~ .label b { text-decoration: line-through; text-decoration-color: rgba(0,0,0,.22); }
  .task input:focus-visible + .box { outline: 2px solid var(--red); outline-offset: 2px; }
  @keyframes pop { 0%{transform:scale(.7)} 55%{transform:scale(1.18)} 100%{transform:scale(1)} }

  .tip { display: flex; gap: .6rem; padding: .85rem 1rem; margin: 0 0 1rem; border-radius: 13px; background: #fff7e6; border: 1px solid #f3e0b0; font-size: .86rem; color: #835c12; }
  .tip.info { background: var(--red-soft); border-color: #f6cdd4; color: var(--red-deep); }

  .lead { font-size: 1.08rem; line-height: 1.62; margin: 0 0 1.3rem; max-width: 60ch; }
  .lead b { color: var(--red-deep); font-weight: 600; }
  .updated { display: inline-flex; align-items: center; gap: .45rem; font: 700 .76rem var(--sans); color: var(--red-deep); background: var(--red-soft); border: 1px solid #f6cdd4; padding: .34rem .8rem; border-radius: 999px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 0 0 rgba(20,163,90,.5); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(20,163,90,.45)} 70%{box-shadow:0 0 0 7px rgba(20,163,90,0)} 100%{box-shadow:0 0 0 0 rgba(20,163,90,0)} }

  .steps { display: grid; gap: .6rem; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); margin: 1.2rem 0 .2rem; }
  .step { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; padding: .9rem 1rem; box-shadow: var(--shadow-sm); transition: transform .3s var(--ease), box-shadow .3s var(--ease); }
  .step:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .step .n { font-family: var(--display); font-size: 1.15rem; color: var(--red); font-weight: 800; }
  .step b { display: block; font-size: .9rem; margin-top: .1rem; }
  .step small { color: var(--muted); font-size: .78rem; }

  .info-grid { display: grid; gap: .85rem; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); }
  .info-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); padding: 1.15rem; box-shadow: var(--shadow-sm); transition: transform .3s var(--ease), box-shadow .3s var(--ease); }
  .info-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .info-card h4 { margin: 0 0 .4rem; font-size: .9rem; }
  .info-card .big { font-family: var(--display); font-size: 1.5rem; font-weight: 800; color: var(--red); display: block; letter-spacing: -.02em; }
  .info-card p { margin: .25rem 0 0; font-size: .84rem; color: var(--muted); }

  .cond-list { display: flex; flex-direction: column; gap: .7rem; margin-bottom: 1.1rem; }
  .cond { display: flex; gap: .95rem; align-items: flex-start; background: var(--paper); border: 1px solid var(--line); border-radius: 15px; padding: 1rem 1.15rem; box-shadow: var(--shadow-sm); transition: transform .25s var(--ease), box-shadow .25s var(--ease); }
  .cond:hover { transform: translateX(4px); box-shadow: var(--shadow); }
  .cond > span { font-size: 1.4rem; line-height: 1.2; flex: none; }
  .cond b { font-size: .96rem; }
  .cond p { margin: .18rem 0 0; color: var(--muted); font-size: .86rem; }

  details.faq { background: var(--paper); border: 1px solid var(--line); border-radius: 14px; margin-bottom: .6rem; box-shadow: var(--shadow-sm); overflow: hidden; transition: box-shadow .25s var(--ease); }
  details.faq:hover { box-shadow: var(--shadow); }
  details.faq summary { padding: 1rem 1.15rem; font-weight: 600; cursor: pointer; list-style: none; display: flex; justify-content: space-between; gap: 1rem; align-items: center; font-size: .94rem; }
  details.faq summary::-webkit-details-marker { display: none; }
  details.faq summary::after { content: "+"; color: var(--red); font-size: 1.4rem; font-weight: 300; transition: transform .25s var(--ease); }
  details.faq[open] summary::after { transform: rotate(135deg); }
  details.faq p { margin: 0; padding: 0 1.15rem 1.1rem; color: var(--muted); font-size: .89rem; animation: rise .35s var(--ease); }

  .disclaimer { margin-top: 1.5rem; padding: 1.15rem 1.25rem; background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--line); border-radius: var(--r-md); font-size: .81rem; color: var(--muted); line-height: 1.65; box-shadow: var(--shadow-sm); }

  /* ---------- Responsive ---------- */
  @media (max-width: 880px) {
    .app { grid-template-columns: 1fr; }
    aside { position: static; }
    nav { flex-direction: row; overflow-x: auto; gap: .5rem; padding-bottom: .35rem; scrollbar-width: none; margin-top: .85rem; }
    nav::-webkit-scrollbar { display: none; }
    .nav-item { flex: none; width: auto; flex-direction: column; align-items: center; gap: .35rem; padding: .55rem .7rem; min-width: 80px; }
    .nav-item:hover { transform: none; }
    .nav-item[aria-current="true"]::before { left: 50%; top: auto; bottom: -.35rem; transform: translateX(-50%); width: 22px; height: 4px; }
    .nav-tx { text-align: center; }
    .nav-tx small { display: none; }
    .reset-btn { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, .view.active > *, .box svg path, .dot { animation: none !important; transition-duration: .01ms !important; }
    html { scroll-behavior: auto; }
    .blob { animation: none !important; }
    .box svg path { stroke-dashoffset: 0; }
  }
</style>
</head>
<body>
<div class="mesh"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span></div>

<div class="app">
  <aside>
    <div class="brand">
      <span class="mark" aria-label="Drapeau tunisien"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#dc2640"/><circle cx="50" cy="50" r="30" fill="#fff"/><circle cx="47" cy="50" r="19" fill="#dc2640"/><circle cx="54" cy="50" r="15.5" fill="#fff"/><path d="M62 39 l3.4 8.4 9 0 -7.2 6 2.7 9.2 -7.9-5.8 -7.9 5.8 2.7-9.2 -7.2-6 9 0z" fill="#dc2640"/></svg></span>
      <div><h1>FCR Tunisie</h1><p>Importation de véhicule · changement de résidence</p></div>
    </div>

    <div class="panel">
      <div class="overall">
        <div class="ring" id="ring"><span id="ringPct">0%</span></div>
        <div><strong id="progLabel">Démarrons</strong><small id="progCount">0 / 0 étapes</small></div>
      </div>
      <nav id="nav" aria-label="Phases"></nav>
      <button class="reset-btn" id="resetBtn" type="button">Réinitialiser ma progression</button>
    </div>
  </aside>

  <main id="main"></main>
</div>

<script>
const UPDATED = "13 juin 2026";

const DATA = [
  { key:"intro", short:"Accueil", icon:"🏠", phase:"Présentation", title:"Importer votre véhicule en Tunisie, sereinement", sub:"Le guide pas à pas du régime FCR (changement de résidence).", custom:"intro" },
  { key:"p1", short:"Étranger", icon:"🌍", phase:"Phase 1", title:"Dans le pays de résidence", sub:"Achat du véhicule et formalités avant le départ.",
    groups:[
      { title:"Avant d'acheter", items:[
        { t:"Vérifier l'âge du véhicule", d:"≤ 5 ans (voitures) · ≤ 3 ans (utilitaires légers)." },
        { t:"Vérifier les conditions de séjour", d:"≥ 2 ans à l'étranger, sans dépasser 120 jours/an en Tunisie." },
      ]},
      { title:"Au moment de l'achat", items:[
        { t:"Paiement du véhicule", d:"Conserver une preuve de paiement (virement bancaire recommandé)." },
        { t:"Facture d'achat originale", d:"Original + copie." },
        { t:"Certificat de cession", d:"Rempli et signé par le vendeur et l'acheteur." },
        { t:"Déclaration d'achat", d:"Si achat via un professionnel." },
        { t:"Carte grise originale (pays d'origine)", d:"Barrée, datée, signée — mention « Vendu le… »." },
        { t:"Certificat de non-gage", d:"Situation administrative à imprimer." },
      ]},
      { title:"Consulat de Tunisie (pays de résidence)", items:[
        { t:"Légalisation de signature", d:"Sur le certificat de cession." },
        { t:"Fiche des mouvements frontaliers", d:"Si passeport < 2 ans ou tampons illisibles." },
      ]},
    ]},
  { key:"p2", short:"Bateau", icon:"🚢", phase:"Phase 2", title:"La traversée en bateau", sub:"Formalités à bord du navire.",
    tip:{ type:"info", text:"Ces formalités se font à bord, auprès du bureau des douanes du navire." },
    groups:[
      { title:"À bord du bateau", items:[
        { t:"Déclaration de douane du véhicule", d:"À remplir auprès des douanes à bord." },
        { t:"Permis de circulation provisoire", d:"Récupérer le ticket / diptyque cartonné." },
      ]},
    ]},
  { key:"p3", short:"Douane", icon:"🇹🇳", phase:"Phase 3", title:"En Tunisie — Inspection & Douane", sub:"Le cœur de la procédure à l'arrivée.",
    groups:[
      { title:"Documents administratifs", items:[
        { t:"Photocopie des 32 pages du passeport", d:"Bénéficiaire." },
        { t:"Photocopie de la CIN", d:"Bénéficiaire + conjoint." },
        { t:"Extrait de naissance tunisien", d:"Moins de 3 mois." },
        { t:"Certificat de non-gage récent", d:"Du pays d'origine, réimprimé après la date d'entrée en Tunisie." },
      ]},
      { title:"Inspection ATTT", items:[
        { t:"Passage de la Mou3ayna (معاينة)", d:"Centre de visite technique de l'ATTT." },
        { t:"Certificat d'identification (Annexe V)", d:"À récupérer après la Mou3ayna." },
        { t:"Fiche de pesée", d:"Uniquement utilitaires / grands gabarits." },
      ]},
      { title:"Douane & transitaire", items:[
        { t:"Saisie de la déclaration de douane", d:"Avec le transitaire." },
        { t:"Demande de privilège fiscal (Modèle 6.3.41)", d:"Formulaire officiel à signer." },
        { t:"Dépôt du dossier complet", d:"Identité, papiers légalisés, Mou3ayna, permis provisoire." },
        { t:"Paiement des droits & Mainlevée", d:"Quittance / mainlevée." },
      ]},
    ]},
  { key:"p4", short:"Immat.", icon:"💳", phase:"Phase 4", title:"Formalités finales & immatriculation", sub:"Mise en circulation du véhicule.",
    groups:[
      { title:"Immatriculation", items:[
        { t:"Demande de carte grise tunisienne", d:"À l'ATTT, avec l'accord de la douane." },
        { t:"Pose de la nouvelle plaque", d:"Série « ن ت » (RS) ou normale si taxes payées (≈ 30 %)." },
      ]},
      { title:"Mise en circulation", items:[
        { t:"Assurance tunisienne", d:"Avec le nouveau numéro d'immatriculation." },
        { t:"Achat de la vignette", d:"Taxe de circulation à la Recette des Finances." },
        { t:"Procuration de conduite RS", d:"Autorisation exceptionnelle pour la famille proche." },
      ]},
    ]},
  { key:"cond", short:"Conditions", icon:"✅", phase:"Éligibilité", title:"Conditions d'éligibilité", sub:"Qui peut bénéficier du régime FCR, et sous quelles conditions.", custom:"cond" },
  { key:"faq", short:"FAQ", icon:"❓", phase:"Aide", title:"Questions fréquentes", sub:"Les points qui bloquent le plus souvent.", custom:"faq" },
];

const KEY = "fcr-tn-v3";
let done = JSON.parse(localStorage.getItem(KEY) || "{}");
let active = "intro";
const checkSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
const phaseIds = {}; const allIds = [];

const navEl = document.getElementById("nav");
const mainEl = document.getElementById("main");

function build() {
  let idc = 0;
  navEl.innerHTML = ""; mainEl.innerHTML = "";
  DATA.forEach(s => {
    phaseIds[s.key] = [];
    const b = document.createElement("button");
    b.className = "nav-item"; b.dataset.key = s.key;
    b.innerHTML = `<span class="nav-ic">${s.icon}</span><span class="nav-tx"><b>${s.short}</b><small>${s.phase}</small></span>`;
    b.addEventListener("click", () => show(s.key));
    navEl.appendChild(b);

    const v = document.createElement("section");
    v.className = "view"; v.dataset.key = s.key;
    let h = `<div class="view-head"><span class="eyebrow">${s.icon} ${s.phase}</span><h2>${s.title}</h2><div class="sub">${s.sub}</div></div>`;
    if (s.custom === "intro") h += introHTML();
    else if (s.custom === "cond") h += condHTML();
    else if (s.custom === "faq") h += faqHTML();
    else {
      if (s.tip) h += `<div class="tip ${s.tip.type}">${s.tip.type==="info"?"ℹ️":"⚠️"} ${s.tip.text}</div>`;
      s.groups.forEach(g => {
        h += `<div class="group"><h3>${g.title}</h3><ul class="tasks">`;
        g.items.forEach(it => {
          const id = "t"+(idc++); allIds.push(id); phaseIds[s.key].push(id);
          h += `<li><label class="task"><input type="checkbox" data-id="${id}" ${done[id]?"checked":""}/><span class="box">${checkSvg}</span><span class="label"><b>${it.t}</b>${it.d?`<small>${it.d}</small>`:""}</span></label></li>`;
        });
        h += `</ul></div>`;
      });
    }
    v.innerHTML = h;
    mainEl.appendChild(v);
  });
  show(active);
  update();
}

function show(key) {
  active = key;
  document.querySelectorAll(".nav-item").forEach(t => t.setAttribute("aria-current", t.dataset.key === key));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.dataset.key === key));
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function update() {
  const n = allIds.filter(id => done[id]).length, total = allIds.length;
  const pct = total ? Math.round(n/total*100) : 0;
  document.getElementById("ring").style.setProperty("--p", pct);
  document.getElementById("ringPct").textContent = pct + "%";
  document.getElementById("progCount").textContent = `${n} / ${total} étapes`;
  document.getElementById("progLabel").textContent = pct===0 ? "Démarrons" : pct===100 ? "Terminé 🎉" : pct<50 ? "En cours 💪" : "Bientôt fini 🏁";
  DATA.forEach(s => {
    const item = navEl.querySelector(`.nav-item[data-key="${s.key}"]`);
    const ids = phaseIds[s.key];
    if (!ids.length) return;
    const c = ids.filter(id => done[id]).length;
    let badge = item.querySelector(".nav-count");
    if (!badge) { badge = document.createElement("span"); badge.className = "nav-count"; item.appendChild(badge); }
    badge.textContent = `${c}/${ids.length}`;
    item.classList.toggle("done", c === ids.length);
  });
}

mainEl.addEventListener("change", e => {
  const cb = e.target.closest("input[type=checkbox]"); if (!cb) return;
  if (cb.checked) done[cb.dataset.id] = 1; else delete done[cb.dataset.id];
  localStorage.setItem(KEY, JSON.stringify(done));
  update();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Réinitialiser toute votre progression ?")) return;
  done = {}; localStorage.removeItem(KEY);
  document.querySelectorAll("input[type=checkbox]").forEach(c => c.checked = false);
  update();
});
