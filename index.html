<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FCR Tunisie — Checklist importation véhicule</title>
<meta name="description" content="Checklist claire pour importer votre véhicule en Tunisie sous le régime FCR (changement de résidence) — Douane tunisienne & ATTT." />
<meta name="theme-color" content="#d62631" />
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23d62631'/><circle cx='50' cy='50' r='30' fill='%23ffffff'/><circle cx='48' cy='50' r='19' fill='%23d62631'/><circle cx='55' cy='50' r='15.5' fill='%23ffffff'/><path d='M63 40 l3.2 8 8.4 0 -6.6 5.6 2.5 8.8 -7.5-5.6 -7.5 5.6 2.5-8.8 -6.6-5.6 8.4 0z' fill='%23d62631'/></svg>" />
<style>
  :root {
    --sage: #d62631;
    --sage-dark: #a4161f;
    --sage-soft: #fdeded;
    --sage-line: #f0dadc;
    --green: #16a34a;
    --ink: #2a2226;
    --muted: #76696c;
    --paper: #ffffff;
    --bg: #faf6f6;
    --gold: #c2a36b;
    --radius: 18px;
    --shadow: 0 1px 2px rgba(40,50,40,.04), 0 14px 40px -20px rgba(40,60,45,.35);
    --shadow-sm: 0 1px 2px rgba(40,50,40,.04), 0 6px 18px -12px rgba(40,60,45,.3);
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
    --serif: "Iowan Old Style", "Palatino Linotype", Palatino, Georgia, serif;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-family: var(--sans);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased;
    background:
      radial-gradient(900px 500px at 12% -10%, #fde3e4, transparent),
      radial-gradient(800px 600px at 100% 0%, #fdeceb, transparent),
      var(--bg);
    min-height: 100vh;
  }

  .app { max-width: 1000px; margin: 0 auto; padding: clamp(1rem, 3vw, 2.25rem) 1rem; display: grid; gap: clamp(1rem, 2.5vw, 1.75rem); grid-template-columns: 290px 1fr; align-items: start; }

  /* ---------- Sidebar ---------- */
  aside { position: sticky; top: clamp(1rem, 3vw, 2.25rem); display: flex; flex-direction: column; gap: 1rem; }
  .brand { display: flex; align-items: center; gap: .7rem; }
  .brand .mark { width: 42px; height: 42px; flex: none; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-sm); display: block; }
  .brand .mark svg { display: block; width: 100%; height: 100%; }
  .brand h1 { margin: 0; font-size: 1.15rem; letter-spacing: -.01em; font-family: var(--serif); }
  .brand p { margin: 0; font-size: .76rem; color: var(--muted); letter-spacing: .02em; }

  .panel { background: var(--paper); border: 1px solid var(--sage-line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.1rem; }

  .overall { display: flex; align-items: center; gap: .9rem; margin-bottom: .35rem; }
  .ring { --p: 0; width: 58px; height: 58px; flex: none; border-radius: 50%; background: conic-gradient(var(--sage) calc(var(--p)*1%), var(--sage-line) 0); display: grid; place-items: center; transition: --p .5s var(--ease); }
  .ring::after { content:""; width: 44px; height: 44px; background: var(--paper); border-radius: 50%; grid-area: 1/1; }
  .ring span { grid-area: 1/1; z-index: 1; font-weight: 800; font-size: .82rem; color: var(--sage-dark); }
  .overall strong { display: block; font-size: .95rem; font-family: var(--serif); }
  .overall small { color: var(--muted); font-size: .8rem; }

  nav { display: flex; flex-direction: column; gap: .25rem; margin-top: .4rem; }
  .nav-item {
    display: flex; align-items: center; gap: .7rem; width: 100%; text-align: left;
    border: none; background: transparent; cursor: pointer; color: var(--ink);
    padding: .6rem .65rem; border-radius: 12px; font: inherit; transition: background .18s var(--ease);
  }
  .nav-item:hover { background: var(--sage-soft); }
  .nav-item[aria-current="true"] { background: var(--sage-soft); box-shadow: inset 3px 0 0 var(--sage); }
  .nav-ic { width: 30px; height: 30px; flex: none; border-radius: 9px; display: grid; place-items: center; font-size: .95rem; background: var(--sage-soft); }
  .nav-item[aria-current="true"] .nav-ic { background: var(--sage); filter: saturate(1.1); }
  .nav-tx { flex: 1; min-width: 0; }
  .nav-tx b { display: block; font-size: .88rem; font-weight: 600; }
  .nav-tx small { color: var(--muted); font-size: .74rem; }
  .nav-count { font-size: .72rem; font-weight: 700; color: var(--sage-dark); background: var(--sage-soft); border-radius: 999px; padding: .12rem .5rem; }
  .nav-item.done .nav-count { background: var(--green); color: #fff; }

  .reset-btn { margin-top: .6rem; width: 100%; border: 1px solid var(--sage-line); background: var(--bg); color: var(--muted); border-radius: 11px; padding: .55rem; font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .2s var(--ease); }
  .reset-btn:hover { color: var(--sage-dark); border-color: var(--sage); background: #fff; }

  /* ---------- Content ---------- */
  main { min-width: 0; }
  .view { display: none; animation: fade .3s var(--ease); }
  .view.active { display: block; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .view-head { margin: 0 0 1.1rem; }
  .eyebrow { display: inline-flex; align-items: center; gap: .4rem; font-size: .74rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; color: var(--sage-dark); background: var(--sage-soft); padding: .3rem .7rem; border-radius: 999px; }
  .view-head h2 { margin: .55rem 0 .2rem; font-family: var(--serif); font-size: clamp(1.5rem, 1rem + 1.6vw, 2rem); letter-spacing: -.015em; line-height: 1.1; }
  .view-head .sub { color: var(--muted); font-size: .92rem; }

  .group { background: var(--paper); border: 1px solid var(--sage-line); border-radius: var(--radius); box-shadow: var(--shadow-sm); overflow: hidden; margin-bottom: 1rem; }
  .group > h3 { margin: 0; padding: .85rem 1.2rem; font-size: .76rem; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); border-bottom: 1px solid var(--sage-line); }
  ul.tasks { list-style: none; margin: 0; padding: .35rem; }
  .task { display: flex; gap: .85rem; align-items: flex-start; padding: .7rem .85rem; border-radius: 12px; cursor: pointer; transition: background .15s var(--ease); }
  .task:hover { background: var(--sage-soft); }
  .task input { position: absolute; opacity: 0; pointer-events: none; }
  .box { flex: none; width: 22px; height: 22px; border-radius: 7px; border: 2px solid #c3cdc2; margin-top: 1px; display: grid; place-items: center; transition: all .18s var(--ease); }
  .box svg { opacity: 0; transform: scale(.4); transition: all .18s var(--ease); color: #fff; }
  .task .label { flex: 1; }
  .task .label b { font-weight: 650; }
  .task .label small { display: block; color: var(--muted); font-size: .83rem; margin-top: .1rem; }
  .task input:checked + .box { background: var(--green); border-color: var(--green); }
  .task input:checked + .box svg { opacity: 1; transform: scale(1); }
  .task input:checked ~ .label { color: var(--muted); }
  .task input:checked ~ .label b { text-decoration: line-through; text-decoration-color: rgba(0,0,0,.22); }
  .task input:focus-visible + .box { outline: 2px solid var(--sage); outline-offset: 2px; }

  .tip { display: flex; gap: .6rem; padding: .85rem 1rem; margin: 0 0 1rem; border-radius: 12px; background: #fbf6ea; border: 1px solid #ecdcb6; font-size: .86rem; color: #7a5d1f; }
  .tip.info { background: var(--sage-soft); border-color: var(--sage-line); color: var(--sage-dark); }

  .info-grid { display: grid; gap: .85rem; grid-template-columns: repeat(auto-fit, minmax(180px,1fr)); }
  .info-card { background: var(--paper); border: 1px solid var(--sage-line); border-radius: 15px; padding: 1.1rem; box-shadow: var(--shadow-sm); }
  .info-card h4 { margin: 0 0 .35rem; font-size: .88rem; }
  .info-card .big { font-size: 1.4rem; font-weight: 800; color: var(--sage-dark); display: block; font-family: var(--serif); }
  .info-card p { margin: .2rem 0 0; font-size: .83rem; color: var(--muted); }

  .lead { font-size: 1.04rem; line-height: 1.6; color: var(--ink); margin: 0 0 1.2rem; max-width: 62ch; }
  .lead b { color: var(--sage-dark); }
  .updated { display: inline-flex; align-items: center; gap: .4rem; font-size: .76rem; font-weight: 700; color: var(--sage-dark); background: var(--sage-soft); border: 1px solid var(--sage-line); padding: .32rem .75rem; border-radius: 999px; }
  .steps { display: grid; gap: .55rem; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); margin: 1.1rem 0 .2rem; }
  .step { background: var(--paper); border: 1px solid var(--sage-line); border-radius: 13px; padding: .85rem .95rem; box-shadow: var(--shadow-sm); }
  .step .n { font-family: var(--serif); font-size: 1.1rem; color: var(--sage); font-weight: 800; }
  .step b { display: block; font-size: .88rem; margin-top: .1rem; }
  .step small { color: var(--muted); font-size: .78rem; }
  .cond-list { display: flex; flex-direction: column; gap: .65rem; margin-bottom: 1rem; }
  .cond { display: flex; gap: .9rem; align-items: flex-start; background: var(--paper); border: 1px solid var(--sage-line); border-radius: 14px; padding: .9rem 1.05rem; box-shadow: var(--shadow-sm); }
  .cond > span { font-size: 1.35rem; line-height: 1.2; flex: none; }
  .cond b { font-size: .94rem; }
  .cond p { margin: .15rem 0 0; color: var(--muted); font-size: .85rem; }

  details.faq { background: var(--paper); border: 1px solid var(--sage-line); border-radius: 13px; margin-bottom: .6rem; box-shadow: var(--shadow-sm); overflow: hidden; }
  details.faq summary { padding: .95rem 1.1rem; font-weight: 600; cursor: pointer; list-style: none; display: flex; justify-content: space-between; gap: 1rem; align-items: center; font-size: .93rem; }
  details.faq summary::-webkit-details-marker { display: none; }
  details.faq summary::after { content: "+"; color: var(--sage); font-size: 1.3rem; transition: transform .2s var(--ease); }
  details.faq[open] summary::after { transform: rotate(45deg); }
  details.faq p { margin: 0; padding: 0 1.1rem 1.05rem; color: var(--muted); font-size: .88rem; }

  .disclaimer { margin-top: 1.5rem; padding: 1.1rem 1.2rem; background: var(--paper); border: 1px solid var(--sage-line); border-radius: 14px; font-size: .8rem; color: var(--muted); line-height: 1.65; box-shadow: var(--shadow-sm); }

  /* ---------- Responsive ---------- */
  @media (max-width: 860px) {
    .app { grid-template-columns: 1fr; }
    aside { position: static; }
    .brand { padding: 0 .2rem; }
    nav { flex-direction: row; overflow-x: auto; gap: .5rem; padding-bottom: .3rem; scrollbar-width: none; margin-top: .8rem; }
    nav::-webkit-scrollbar { display: none; }
    .nav-item { flex: none; width: auto; flex-direction: column; align-items: center; gap: .35rem; padding: .55rem .7rem; min-width: 78px; }
    .nav-item[aria-current="true"] { box-shadow: inset 0 -3px 0 var(--sage); }
    .nav-tx { text-align: center; }
    .nav-tx small { display: none; }
    .reset-btn { display: none; }
    .panel.nav-panel { padding: .7rem; }
    .overall { margin-bottom: 0; }
  }

  @media (prefers-reduced-motion: reduce) { *, .view { animation: none !important; transition: none !important; } html { scroll-behavior: auto; } }
</style>
</head>
<body>

<div class="app">
  <aside>
    <div class="brand">
      <span class="mark" aria-label="Drapeau tunisien"><svg viewBox="0 0 100 100"><rect width="100" height="100" fill="#d62631"/><circle cx="50" cy="50" r="30" fill="#fff"/><circle cx="47" cy="50" r="19" fill="#d62631"/><circle cx="54" cy="50" r="15.5" fill="#fff"/><path d="M62 39 l3.4 8.4 9 0 -7.2 6 2.7 9.2 -7.9-5.8 -7.9 5.8 2.7-9.2 -7.2-6 9 0z" fill="#d62631"/></svg></span>
      <div><h1>FCR Tunisie</h1><p>Importation de véhicule · changement de résidence</p></div>
    </div>

    <div class="panel nav-panel">
      <div class="overall">
        <div class="ring" id="ring"><span id="ringPct">0%</span></div>
        <div><strong id="progLabel">Démarrons</strong><small id="progCount">0 / 0 étapes</small></div>
      </div>
      <nav id="nav" aria-label="Phases"><!-- injected --></nav>
      <button class="reset-btn" id="resetBtn" type="button">Réinitialiser ma progression</button>
    </div>
  </aside>

  <main id="main"><!-- injected --></main>
</div>

<script>
const UPDATED = "13 juin 2026";

const DATA = [
  { key:"intro", short:"Accueil", icon:"🏠", phase:"Présentation", title:"Importer votre véhicule en Tunisie, sereinement", sub:"Le guide pas à pas du régime FCR (changement de résidence).", custom:"intro" },
  { key:"p1", short:"Étranger", icon:"🌍", phase:"Phase 1", title:"Dans le pays de résidence", sub:"Achat du véhicule et formalités avant le départ.",
    groups:[
      { title:"Avant d'acheter", items:[
        { t:"Vérifier l'âge du véhicule", d:"≤ 5 ans (voitures) · ≤ 3 ans (utilitaires légers)." },
        { t:"Vérifier les conditions de séjour", d:"≥ 2 ans à l'étranger, sans dépasser 120 jours/an en Tunisie." },
      ]},
      { title:"Au moment de l'achat", items:[
        { t:"Paiement du véhicule", d:"Conserver une preuve de paiement (virement bancaire recommandé)." },
        { t:"Facture d'achat originale", d:"Original + copie." },
        { t:"Certificat de cession", d:"Rempli et signé par le vendeur et l'acheteur." },
        { t:"Déclaration d'achat", d:"Si achat via un professionnel." },
        { t:"Carte grise originale (pays d'origine)", d:"Barrée, datée, signée — mention « Vendu le… »." },
        { t:"Certificat de non-gage", d:"Situation administrative à imprimer." },
      ]},
      { title:"Consulat de Tunisie (pays de résidence)", items:[
        { t:"Légalisation de signature", d:"Sur le certificat de cession." },
        { t:"Fiche des mouvements frontaliers", d:"Si passeport < 2 ans ou tampons illisibles." },
      ]},
    ]},
  { key:"p2", short:"Bateau", icon:"🚢", phase:"Phase 2", title:"La traversée en bateau", sub:"Formalités à bord du navire.",
    tip:{ type:"info", text:"Ces formalités se font à bord, auprès du bureau des douanes du navire." },
    groups:[
      { title:"À bord du bateau", items:[
        { t:"Déclaration de douane du véhicule", d:"À remplir auprès des douanes à bord." },
        { t:"Permis de circulation provisoire", d:"Récupérer le ticket / diptyque cartonné." },
      ]},
    ]},
  { key:"p3", short:"Douane", icon:"🇹🇳", phase:"Phase 3", title:"En Tunisie — Inspection & Douane", sub:"Le cœur de la procédure à l'arrivée.",
    groups:[
      { title:"Documents administratifs", items:[
        { t:"Photocopie des 32 pages du passeport", d:"Bénéficiaire." },
        { t:"Photocopie de la CIN", d:"Bénéficiaire + conjoint." },
        { t:"Extrait de naissance tunisien", d:"Moins de 3 mois." },
        { t:"Certificat de non-gage récent", d:"Du pays d'origine, réimprimé après la date d'entrée en Tunisie." },
      ]},
      { title:"Inspection ATTT", items:[
        { t:"Passage de la Mou3ayna (معاينة)", d:"Centre de visite technique de l'ATTT." },
        { t:"Certificat d'identification (Annexe V)", d:"À récupérer après la Mou3ayna." },
        { t:"Fiche de pesée", d:"Uniquement utilitaires / grands gabarits." },
      ]},
      { title:"Douane & transitaire", items:[
        { t:"Saisie de la déclaration de douane", d:"Avec le transitaire." },
        { t:"Demande de privilège fiscal (Modèle 6.3.41)", d:"Formulaire officiel à signer." },
        { t:"Dépôt du dossier complet", d:"Identité, papiers légalisés, Mou3ayna, permis provisoire." },
        { t:"Paiement des droits & Mainlevée", d:"Quittance / mainlevée." },
      ]},
    ]},
  { key:"p4", short:"Immat.", icon:"💳", phase:"Phase 4", title:"Formalités finales & immatriculation", sub:"Mise en circulation du véhicule.",
    groups:[
      { title:"Immatriculation", items:[
        { t:"Demande de carte grise tunisienne", d:"À l'ATTT, avec l'accord de la douane." },
        { t:"Pose de la nouvelle plaque", d:"Série « ن ت » (RS) ou normale si taxes payées (≈ 30 %)." },
      ]},
      { title:"Mise en circulation", items:[
        { t:"Assurance tunisienne", d:"Avec le nouveau numéro d'immatriculation." },
        { t:"Achat de la vignette", d:"Taxe de circulation à la Recette des Finances." },
        { t:"Procuration de conduite RS", d:"Autorisation exceptionnelle pour la famille proche." },
      ]},
    ]},
  { key:"cond", short:"Conditions", icon:"✅", phase:"Éligibilité", title:"Conditions d'éligibilité", sub:"Qui peut bénéficier du régime FCR, et sous quelles conditions.", custom:"cond" },
  { key:"faq", short:"FAQ", icon:"❓", phase:"Aide", title:"Questions fréquentes", sub:"Les points qui bloquent le plus souvent.", custom:"faq" },
];

const KEY = "fcr-tn-v3";
let done = JSON.parse(localStorage.getItem(KEY) || "{}");
let active = "intro";
const checkSvg = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>';
const phaseIds = {}; const allIds = [];

const navEl = document.getElementById("nav");
const mainEl = document.getElementById("main");

function build() {
  let idc = 0;
  navEl.innerHTML = ""; mainEl.innerHTML = "";
  DATA.forEach(s => {
    phaseIds[s.key] = [];
    // nav
    const b = document.createElement("button");
    b.className = "nav-item"; b.dataset.key = s.key;
    b.innerHTML = `<span class="nav-ic">${s.icon}</span><span class="nav-tx"><b>${s.short}</b><small>${s.phase}</small></span>`;
    b.addEventListener("click", () => show(s.key));
    navEl.appendChild(b);

    // view
    const v = document.createElement("section");
    v.className = "view"; v.dataset.key = s.key;
    let h = `<div class="view-head"><span class="eyebrow">${s.icon} ${s.phase}</span><h2>${s.title}</h2><div class="sub">${s.sub}</div></div>`;
    if (s.custom === "intro") h += introHTML();
    else if (s.custom === "cond") h += condHTML();
    else if (s.custom === "faq") h += faqHTML();
    else {
      if (s.tip) h += `<div class="tip ${s.tip.type}">${s.tip.type==="info"?"ℹ️":"⚠️"} ${s.tip.text}</div>`;
      s.groups.forEach(g => {
        h += `<div class="group"><h3>${g.title}</h3><ul class="tasks">`;
        g.items.forEach(it => {
          const id = "t"+(idc++); allIds.push(id); phaseIds[s.key].push(id);
          h += `<li><label class="task"><input type="checkbox" data-id="${id}" ${done[id]?"checked":""}/><span class="box">${checkSvg}</span><span class="label"><b>${it.t}</b>${it.d?`<small>${it.d}</small>`:""}</span></label></li>`;
        });
        h += `</ul></div>`;
      });
    }
    v.innerHTML = h;
    mainEl.appendChild(v);
  });
  show(active);
  update();
}

function show(key) {
  active = key;
  document.querySelectorAll(".nav-item").forEach(t => t.setAttribute("aria-current", t.dataset.key === key));
  document.querySelectorAll(".view").forEach(v => v.classList.toggle("active", v.dataset.key === key));
  window.scrollTo({ top: 0, behavior: "auto" });
}

function update() {
  const n = allIds.filter(id => done[id]).length, total = allIds.length;
  const pct = total ? Math.round(n/total*100) : 0;
  document.getElementById("ring").style.setProperty("--p", pct);
  document.getElementById("ringPct").textContent = pct + "%";
  document.getElementById("progCount").textContent = `${n} / ${total} étapes`;
  document.getElementById("progLabel").textContent = pct===0 ? "Démarrons" : pct===100 ? "Terminé 🎉" : pct<50 ? "En cours 💪" : "Bientôt fini 🏁";
  // per-phase counts
  DATA.forEach(s => {
    const item = navEl.querySelector(`.nav-item[data-key="${s.key}"]`);
    const ids = phaseIds[s.key];
    if (!ids.length) return;
    const c = ids.filter(id => done[id]).length;
    let badge = item.querySelector(".nav-count");
    if (!badge) { badge = document.createElement("span"); badge.className = "nav-count"; item.appendChild(badge); }
    badge.textContent = `${c}/${ids.length}`;
    item.classList.toggle("done", c === ids.length);
  });
}

mainEl.addEventListener("change", e => {
  const cb = e.target.closest("input[type=checkbox]"); if (!cb) return;
  if (cb.checked) done[cb.dataset.id] = 1; else delete done[cb.dataset.id];
  localStorage.setItem(KEY, JSON.stringify(done));
  update();
});

document.getElementById("resetBtn").addEventListener("click", () => {
  if (!confirm("Réinitialiser toute votre progression ?")) return;
  done = {}; localStorage.removeItem(KEY);
  document.querySelectorAll("input[type=checkbox]").forEach(c => c.checked = false);
  update();
});

function introHTML() {
  return `<p class="lead">Vous rapatriez votre voiture en Tunisie dans le cadre d'un <b>changement de résidence</b> ? Le <b>régime FCR</b> permet de l'importer en franchise (ou à taxes réduites). Ce guide réunit, étape par étape, <b>tous les documents et démarches</b> — de l'achat à l'étranger jusqu'à l'immatriculation finale.</p>
  <div class="info-grid">
    <div class="info-card"><h4>🧭 Comment l'utiliser</h4><p>Parcourez les 4 phases dans l'ordre et cochez chaque étape au fur et à mesure.</p></div>
    <div class="info-card"><h4>💾 Sauvegarde auto</h4><p>Votre progression est enregistrée sur cet appareil — rien à créer, aucun compte.</p></div>
    <div class="info-card"><h4>🔒 100 % privé</h4><p>Aucune donnée n'est envoyée sur internet. Tout reste dans votre navigateur.</p></div>
  </div>
  <div class="steps">
